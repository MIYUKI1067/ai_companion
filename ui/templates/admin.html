<!DOCTYPE html>
<html>
<head>

<title>AI Companion Admin</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:600px;
margin:auto;
margin-top:40px;
}

.panel{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input{
width:100%;
padding:6px;
margin-bottom:10px;
}

button{
padding:8px 16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Control Panel</h1>


<div class="panel">

<h2>Modify State</h2>

<label>Mood</label>
<input id="mood" type="number" step="0.01">

<label>Energy</label>
<input id="energy" type="number" step="0.01">

<label>Stress</label>
<input id="stress" type="number" step="0.01">

<label>Location</label>
<input id="location">

<label>Activity</label>
<input id="activity">

<button onclick="updateState()">Update State</button>

</div>


<div class="panel">

<h2>Override Time</h2>

<label>Time (YYYY-MM-DD HH:MM)</label>
<input id="time">

<button onclick="updateTime()">Set Time</button>

</div>

</div>


<script>

async function updateState(){

await fetch("/admin/set_state",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

mood:parseFloat(document.getElementById("mood").value),

energy:parseFloat(document.getElementById("energy").value),

stress:parseFloat(document.getElementById("stress").value),

location:document.getElementById("location").value,

activity:document.getElementById("activity").value

})

})

alert("State Updated")

}


async function updateTime(){

await fetch("/admin/set_time",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

time:document.getElementById("time").value

})

})

alert("Time Updated")

}

</script>

</body>
</html>
